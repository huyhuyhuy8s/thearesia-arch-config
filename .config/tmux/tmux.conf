unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-b
set -g mouse on
set-window-option -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background "none"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

set -g status-style "bg=default,fg=default"

# Inactive: subtle text only
set -g window-status-format "#[fg=#{@thm_surface_3}] #I #W "

# Active: rounded pill using explicit unicode U+E0B6 and U+E0B4
set -g window-status-current-format "#[fg=#{@thm_mauve},bg=default]\ue0b6#[bg=#{@thm_mauve},fg=#{@thm_crust},bold] #I #W #[bg=default,fg=#{@thm_mauve}]\ue0b4"

set -g window-status-separator ""

run '~/.tmux/plugins/tpm/tpm'
